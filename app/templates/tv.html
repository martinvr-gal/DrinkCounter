<!DOCTYPE html>
<html lang="gl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrinkCounter TV</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>

  <body class="tv-page">
    <main class="tv-shell">

      <section class="tv-stage">
        <h1>CubataCounter</h1>

        <div class="counter-display" aria-live="polite" aria-atomic="true">
          <span>Número de cubatas vendidos</span>
          <strong id="counter-value">0</strong>
        </div>
      </section>
      <section class="spotify-player">
        <iframe
          style="border-radius:12px"
          src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
          width="100%"
          height="152"
          frameborder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
